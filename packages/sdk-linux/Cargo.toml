[package]
name = "chronoscope-sdk-linux"
version = "0.1.0"
edition = "2021"

[dependencies]
tokio = { version = "1.35", features = ["full"] }
pipewire = "0.8"
x11rb = { version = "0.13", features = ["shm"] }
reqwest = { version = "0.11", features = ["multipart", "json"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
image = "0.24"
anyhow = "1.0"
thiserror = "1.0"
tracing = "0.1"
uuid = { version = "1.6", features = ["v4"] }

# Internal dependency - direct Rust crate (not C ABI)
chronoscope-privacy-engine = { path = "../../services/privacy-engine" }

[dev-dependencies]
tokio-test = "0.4"
