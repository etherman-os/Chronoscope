version: '3.8'
services:
  postgres-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: chronoscope_test
    ports:
      - "5433:5432"  # Different port to avoid conflict
    volumes:
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d chronoscope_test"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-test:
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z
    command: server /data
    environment:
      MINIO_ROOT_USER: test
      MINIO_ROOT_PASSWORD: testpassword
    ports:
      - "9002:9000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  ingestion-test:
    build: services/ingestion
    ports:
      - "8082:8080"
    environment:
      DATABASE_URL: postgres://test:test@postgres-test:5432/chronoscope_test?sslmode=disable
      MINIO_ENDPOINT: minio-test:9000
      MINIO_ACCESS_KEY: test
      MINIO_SECRET_KEY: testpassword
      MINIO_SECURE: "false"
    depends_on:
      postgres-test:
        condition: service_healthy
      minio-test:
        condition: service_healthy

  test-runner:
    image: golang:1.22-alpine
    volumes:
      - .:/workspace
    working_dir: /workspace
    command: ["sh", "-c", "cd services/ingestion && go test ./..."]
    depends_on:
      - ingestion-test
