syntax = "proto3";

package chronoscope.capture;

option go_package = "github.com/chronoscope/capture-schema";
option swift_prefix = "CSC";

message FrameChunk {
  string session_id = 1;
  int32 chunk_index = 2;
  int64 timestamp_start_ms = 3;
  int64 timestamp_end_ms = 4;
  bytes frame_data = 5;
  int32 width = 6;
  int32 height = 7;
}

message Event {
  string session_id = 1;
  string event_type = 2;
  int64 timestamp_ms = 3;
  int32 x = 4;
  int32 y = 5;
  string target = 6;
  string payload = 7;
}

message EventBatch {
  string session_id = 1;
  repeated Event events = 2;
}

message SessionMetadata {
  string session_id = 1;
  string project_id = 2;
  string user_id = 3;
  string os_version = 4;
  string app_version = 5;
  string screen_resolution = 6;
  int32 scale_factor = 7;
  int64 started_at = 8;
}
