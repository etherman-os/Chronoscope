name: CI

on:
  push:
    branches: [main, master]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'CHANGELOG.md'
  pull_request:
    branches: [main, master]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'CHANGELOG.md'

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check scripts are executable
        run: |
          test -x scripts/bump-version.sh
          test -x scripts/release.sh

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Run Go Lint
        run: |
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
          cd services/ingestion && go mod tidy && golangci-lint run ./...
          cd ../analytics && go mod tidy && golangci-lint run ./...
          cd ../../pkg/middleware && go mod tidy && golangci-lint run ./...

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run Rust Lint
        run: |
          cd services/processor && cargo clippy --all-targets --all-features -- -D warnings
          cd ../privacy-engine && cargo clippy --all-targets --all-features -- -D warnings

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run Web Lint
        run: cd services/web && npm ci && npm run lint

      - name: Run Landing Lint
        run: cd services/landing && npm ci && npm run lint

  ingestion:
    name: Ingestion Service Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Run Ingestion Tests
        run: |
          cd services/ingestion
          go mod tidy
          go test ./...

  analytics:
    name: Analytics Service Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Run Analytics Tests
        run: |
          cd services/analytics
          go mod tidy
          go test ./...

  web:
    name: Web Dashboard Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build Web
        run: cd services/web && npm ci && npm run build

      - name: Audit Web Dependencies
        run: cd services/web && npm audit --audit-level=moderate || true
        continue-on-error: true

      - name: Test Web
        run: cd services/web && npm test

  landing:
    name: Landing Page Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build Landing
        run: cd services/landing && npm ci && npm run build

      - name: Audit Landing Dependencies
        run: cd services/landing && npm audit --audit-level=moderate || true
        continue-on-error: true

  sdk-linux:
    name: Linux SDK Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libpipewire-0.3-dev libx11-dev libxext-dev

      - name: Run Linux SDK Tests
        run: cd packages/sdk-linux && cargo test
        continue-on-error: true

  sdk-macos:
    name: macOS SDK Tests
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: '5.10'

      - name: Build Privacy Engine
        run: cd services/privacy-engine && cargo build --release

      - name: Run Swift Tests
        run: cd packages/sdk-macos && swift test || echo "Swift tests skipped (privacy engine linking may require manual setup)"
        continue-on-error: true
